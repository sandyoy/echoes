<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a9e6b"/>
      <stop offset="100%" style="stop-color:#2d8659"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" style="stop-color:#3a8e5b"/>
      <stop offset="100%" style="stop-color:#5abe7b"/>
    </linearGradient>
  </defs>

  <!-- 背景圆 -->
  <circle cx="200" cy="200" r="190" fill="url(#g1)" opacity="0.06"/>

  <!-- 屋檐/房子 -->
  <path d="M80 240 L200 100 L320 240" fill="none" stroke="url(#g1)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 房子主体 -->
  <rect x="140" y="200" width="120" height="100" rx="8" fill="url(#g1)" opacity="0.15"/>
  <rect x="140" y="200" width="120" height="100" rx="8" fill="none" stroke="url(#g1)" stroke-width="4"/>

  <!-- 爱心 -->
  <path d="M200 230 Q200 210 215 210 Q230 210 230 225 Q230 240 200 260 Q170 240 170 225 Q170 210 185 210 Q200 210 200 230Z" fill="url(#g1)" opacity="0.6"/>

  <!-- 烟囱（健康十字） -->
  <rect x="255" y="120" width="6" height="40" rx="3" fill="url(#g1)" opacity="0.4"/>
  <rect x="246" y="130" width="24" height="6" rx="3" fill="url(#g1)" opacity="0.4"/>

  <!-- 文字：家家健 -->
  <text x="200" y="350" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="48" font-weight="700" fill="url(#g1)" letter-spacing="8">家家健</text>

  <!-- 英文 -->
  <text x="200" y="380" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-size="14" fill="#6b9e7b" letter-spacing="3">JIAJIAJIAN HEALTH</text>
</svg>
