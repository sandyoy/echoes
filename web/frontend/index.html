<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#f7f7f7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Echoes</title>
  <link rel="stylesheet" href="/css/echoes.css">
</head>
<body>

<!-- ========== 老人模式 ========== -->
<div id="mode-elder" class="mode mode-elder">
  <div class="elder-bar">
    <span class="elder-logo">Echoes</span>
    <button class="elder-switch" id="elderToNormal">标准模式</button>
  </div>
  <div class="elder-body">
    <p class="elder-prompt">今天想聊些什么？</p>
    <button class="elder-mic" id="elderMic">🎤</button>
    <p class="elder-hint" id="elderHint">按住说话</p>
    <button class="elder-interview" id="elderAI">🤖 AI采访</button>
  </div>
</div>

<!-- ========== 标准模式 ========== -->
<div id="mode-normal" class="mode mode-normal" style="display:none">
  <!-- 顶栏 -->
  <div class="nav-bar">
    <span class="nav-title">Echoes</span>
    <div class="nav-right">
      <button class="nav-btn" id="normalToElder">👓</button>
      <button class="nav-btn" id="loginBtn">登录</button>
    </div>
  </div>

  <!-- 页面容器 -->
  <div class="pages" id="pages">

    <!-- 首页 -->
    <div class="page active" id="page-home">
      <div class="home-hero">
        <button class="home-mic" id="normalMic">
          <span class="home-mic-icon">🎤</span>
          <span class="home-mic-label">按住录音</span>
        </button>
      </div>
      <div class="home-tabs">
        <button class="home-tab active" data-tab="self">自述</button>
        <button class="home-tab" data-tab="interview">AI采访</button>
        <button class="home-tab" data-tab="type">打字</button>
      </div>
      <div class="section-title">最近记录</div>
      <div class="story-list" id="storyList"><div class="empty-state">还没有记录</div></div>
    </div>

    <!-- 时间轴 -->
    <div class="page" id="page-timeline">
      <div class="page-head">时间轴</div>
      <div class="timeline-list" id="timelineList"><div class="empty-state">还没有记录</div></div>
    </div>

    <!-- AI采访 -->
    <div class="page" id="page-interview">
      <div class="page-head">AI采访</div>
      <div class="chat-wrap">
        <div class="chat-box" id="chatBox"></div>
      </div>
      <div class="chat-foot">
        <input class="chat-input" id="chatInput" placeholder="输入回答…">
        <button class="chat-send" id="chatSend">发送</button>
      </div>
    </div>

    <!-- 画册 -->
    <div class="page" id="page-album">
      <div class="page-head">画册</div>
      <div class="empty-state" style="margin-top:60px">记录足够后自动生成</div>
    </div>

  </div>

  <!-- 底部栏 -->
  <div class="tab-bar">
    <button class="tab-item active" data-page="home"><span class="tab-icon">🏠</span><span class="tab-label">首页</span></button>
    <button class="tab-item" data-page="timeline"><span class="tab-icon">📊</span><span class="tab-label">时间轴</span></button>
    <button class="tab-item" data-page="interview"><span class="tab-icon">🎙️</span><span class="tab-label">采访</span></button>
    <button class="tab-item" data-page="album"><span class="tab-icon">📖</span><span class="tab-label">画册</span></button>
  </div>
</div>

<!-- ========== 录音浮层 ========== -->
<div class="rec-overlay" id="recOverlay" style="display:none">
  <div class="rec-body">
    <div class="rec-icon">🎤</div>
    <div class="rec-status">正在录音…</div>
    <div class="rec-timer" id="recTimer">0:00</div>
  </div>
</div>

<!-- ========== 登录弹窗 ========== -->
<div class="dialog-overlay" id="loginDialog" style="display:none">
  <div class="dialog">
    <div class="dialog-hd">
      <span class="dialog-title">登录</span>
      <button class="dialog-close" id="loginClose">✕</button>
    </div>
    <div class="dialog-bd">
      <p class="dialog-desc">登录后数据永久保存</p>
      <div class="field"><input class="field-input" id="phoneInput" placeholder="手机号" type="tel" maxlength="11"></div>
      <div class="field field-row">
        <input class="field-input flex-1" id="codeInput" placeholder="验证码" type="text" maxlength="6">
        <button class="field-btn" id="sendCode">获取验证码</button>
      </div>
      <button class="dialog-btn" id="loginSubmit">登录</button>
    </div>
  </div>
</div>

<!-- ========== 保存弹窗 ========== -->
<div class="dialog-overlay" id="saveDialog" style="display:none">
  <div class="dialog">
    <div class="dialog-hd">
      <span class="dialog-title">保存回忆</span>
      <button class="dialog-close" id="saveClose">✕</button>
    </div>
    <div class="dialog-bd">
      <div class="field"><textarea class="field-input field-textarea" id="saveContent" placeholder="录音已转文字，可以在这里修改…" rows="4"></textarea></div>
      <button class="dialog-btn" id="saveSubmit">保存</button>
    </div>
  </div>
</div>

<script src="/js/echoes.js"></script>
</body>
</html>
