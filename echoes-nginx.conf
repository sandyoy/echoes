# =============================================================
#  🚀 Echoes（往事可追忆）— Nginx 配置
#  域名：yuanaikang.cn → 43.136.31.31
# =============================================================

# ---- 上游：Echoes 后端服务 ----
upstream echoes_backend {
    server 127.0.0.1:3000;
}

# ---- HTTP（80端口）— 重定向到HTTPS或提供临时访问 ----
server {
    listen 80;
    server_name yuanaikang.cn www.yuanaikang.cn;

    # 根目录（静态文件）
    root /home/ubuntu/echoes/web/frontend;
    index echoes.html index.html;

    # API 请求转发到 Node.js 后端
    location /api/ {
        proxy_pass http://echoes_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        client_max_body_size 10m;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 120s;
    }

    # 静态文件直出
    location / {
        try_files $uri $uri/ /echoes.html;
    }

    # 静态文件缓存
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    location ~* \.(css|js)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    access_log /var/log/nginx/echoes-access.log;
    error_log  /var/log/nginx/echoes-error.log;

    # 禁止敏感目录
    location ~ /\.(git|env|svn) { deny all; return 404; }
    location ~ /node_modules { deny all; return 404; }
    location ~ /backend/data { deny all; return 404; }
}
