# =============================================================
#  🚀 Echoes（往事可追忆）— Nginx 部署配置模板
#  适用于腾讯云 / 任何 Linux 服务器正式部署
#
#  📌 使用方法：
#    1. 将此文件上传到服务器 /etc/nginx/sites-available/
#    2. 修改下方 YOUR_DOMAIN_OR_IP 为你的域名或 IP
#    3. 创建软链接：
#       sudo ln -s /etc/nginx/sites-available/echoes-nginx.conf /etc/nginx/sites-enabled/
#    4. 测试配置：sudo nginx -t
#    5. 重载 Nginx：sudo systemctl reload nginx
# =============================================================

# ---- 上游：Echoes 后端服务（Node.js，默认端口 3000） ----
upstream echoes_backend {
    # 后端地址，如果部署在同一台机器上则保持 localhost
    server 127.0.0.1:3000;
    # 如果有多个后端实例，可以在这里添加（负载均衡）
    # server 127.0.0.1:3001;
    # keepalive 32;
}

# ---- HTTP → HTTPS 重定向（推荐） ----
server {
    listen 80;
    server_name YOUR_DOMAIN_OR_IP;  # ← 请改成你的域名或服务器 IP

    # Let's Encrypt 证书验证（使用 certbot 时放开注释）
    # location /.well-known/acme-challenge/ {
    #     root /var/www/html;
    # }

    # 将所有 HTTP 请求重定向到 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS 服务器（主要配置） ----
server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN_OR_IP;  # ← 请改成你的域名

    # ---- SSL 证书配置（腾讯云免费证书 or Let's Encrypt） ----
    # 腾讯云 SSL 证书路径参考：
    # ssl_certificate     /etc/nginx/ssl/YOUR_DOMAIN/fullchain.crt;
    # ssl_certificate_key /etc/nginx/ssl/YOUR_DOMAIN/private.key;
    #
    # 或 Let's Encrypt（certbot）：
    # ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    # ---- SSL 安全配置 ----
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ---- 安全头 ----
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ---- 字符集 ----
    charset utf-8;

    # ---- 根目录（用于静态文件缓存，实际由后端 serve） ----
    root /home/ubuntu/echoes/web/frontend;

    # =============================================================
    #  请求转发：将 API 请求代理到 Node.js 后端
    # =============================================================

    # API 路由 — 转发到后端
    location /api/ {
        proxy_pass http://echoes_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # 增大请求体限制（故事内容可能较大）
        client_max_body_size 10m;

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    120s;
    }

    # =============================================================
    #  静态文件：由 Nginx 直接提供（性能更优）
    #  也可让后端 serve，但 Nginx 效率更高
    # =============================================================

    location / {
        # 对于前端路由（SPA 单页应用），所有路径指向 index.html
        # 如果前端使用了 Vue Router / React Router 的 history 模式
        try_files $uri $uri/ /index.html;

        # 静态文件缓存（图片、字体等）
        location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # CSS / JS 缓存
        location ~* \.(css|js)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ---- 日志配置 ----
    access_log /var/log/nginx/echoes-access.log;
    error_log  /var/log/nginx/echoes-error.log;

    # ---- 禁止访问敏感目录 ----
    location ~ /\.(git|env|svn) {
        deny all;
        return 404;
    }

    location ~ /node_modules {
        deny all;
        return 404;
    }

    location ~ /backend/data {
        deny all;
        return 404;
    }
}
